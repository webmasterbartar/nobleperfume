<!DOCTYPE html>

<html dir="rtl" lang="fa"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<!-- tailwind CDN removed -->
<!-- google fonts CDN removed -->
<!-- google fonts CDN removed -->
<!-- google fonts CDN removed -->
<!-- tailwind mock config removed -->
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Vazirmatn', sans-serif; }
        .glass-nav {
            background: rgba(249, 249, 249, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- Top Navigation Anchor -->
<nav class="bg-surface dark:bg-gray-900 sticky top-0 z-50 flex justify-between items-center w-full px-6 h-16 transition-colors border-none">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="arrow_forward">arrow_forward</span>
<h1 class="text-lg font-bold text-on-surface dark:text-gray-100 font-headline">Check out</h1>
</div>
<div class="flex items-center gap-2">
<span class="text-primary font-bold text-sm">مرحله 2 از 3</span>
</div>
</nav>
<main class="max-w-xl mx-auto px-6 pt-8">
<!-- Progress Stepper -->
<div class="flex items-center justify-between mb-10 px-4">
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary-container text-white flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-xl" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-xs font-medium text-on-surface-variant">آدرس</span>
</div>
<div class="flex-1 h-0.5 bg-primary-container/30 mx-2 mb-6"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center ring-4 ring-primary/20">
<span class="text-sm font-bold">2</span>
</div>
<span class="text-xs font-bold text-primary">ارسال</span>
</div>
<div class="flex-1 h-0.5 bg-surface-container-high mx-2 mb-6"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center">
<span class="text-sm font-bold">3</span>
</div>
<span class="text-xs font-medium text-on-surface-variant">پرداخت</span>
</div>
</div>
<header class="mb-8">
<h2 class="text-2xl font-black text-on-surface mb-2 font-headline">انتخاب شیوه ارسال</h2>
<p class="text-on-surface-variant text-sm">لطفاً زمان و هزینه مورد نظر خود را انتخاب کنید.</p>
</header>
<!-- Shipping Methods List -->
<div class="space-y-4">
<!-- Method: Express (Selected) -->
<label class="block relative cursor-pointer group">
<input checked="" class="peer hidden" name="shipping" type="radio"/>
<div class="p-5 rounded-2xl bg-surface-container-lowest border-2 border-transparent peer-checked:border-primary transition-all shadow-sm flex items-start gap-4">
<div class="w-14 h-14 rounded-xl bg-surface-container flex items-center justify-center overflow-hidden shrink-0">
<img class="w-10 h-10 object-contain" data-alt="professional modern logistics company logo with abstract blue and red speed lines" src="../assets/images/placeholder-hero.svg"/>
</div>
<div class="flex-1">
<div class="flex justify-between items-start mb-1">
<h3 class="font-bold text-on-surface text-lg">ارسال سریع (Express)</h3>
<span class="text-primary font-bold font-body">45,000 تومان</span>
</div>
<p class="text-on-surface-variant text-sm mb-3">تحویل در بازه زمانی کوتاه با اولویت بالا</p>
<div class="flex items-center gap-4 text-xs font-medium text-on-surface/70">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-base" data-icon="calendar_today">calendar_today</span>
<span>فردا، 10 اردیبهشت</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-base" data-icon="schedule">schedule</span>
<span>ساعت 9 تا 14</span>
</div>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center mt-1">
<div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</div>
</label>
<!-- Method: Priority -->
<label class="block relative cursor-pointer group">
<input class="peer hidden" name="shipping" type="radio"/>
<div class="p-5 rounded-2xl bg-surface-container-lowest border-2 border-transparent peer-checked:border-primary transition-all shadow-sm flex items-start gap-4 hover:bg-surface-container-low/50">
<div class="w-14 h-14 rounded-xl bg-surface-container flex items-center justify-center overflow-hidden shrink-0">
<img class="w-10 h-10 object-contain" data-alt="premium logistics logo with gold and black minimalist geometric eagle icon" src="../assets/images/placeholder-hero.svg"/>
</div>
<div class="flex-1">
<div class="flex justify-between items-start mb-1">
<h3 class="font-bold text-on-surface text-lg">ارسال اختصاصی (Priority)</h3>
<span class="text-on-surface font-bold font-body">89,000 تومان</span>
</div>
<p class="text-on-surface-variant text-sm mb-3">تحویل توسط سفیر اختصاصی در زمان دلخواه شما</p>
<div class="flex items-center gap-4 text-xs font-medium text-on-surface/70">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-base" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-primary">امروز، تا ساعت 21</span>
</div>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center mt-1">
<div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</div>
</label>
<!-- Method: Standard -->
<label class="block relative cursor-pointer group">
<input class="peer hidden" name="shipping" type="radio"/>
<div class="p-5 rounded-2xl bg-surface-container-lowest border-2 border-transparent peer-checked:border-primary transition-all shadow-sm flex items-start gap-4 hover:bg-surface-container-low/50">
<div class="w-14 h-14 rounded-xl bg-surface-container flex items-center justify-center overflow-hidden shrink-0">
<img class="w-10 h-10 object-contain" data-alt="classic national post service logo with yellow and blue circular emblem" src="../assets/images/placeholder-hero.svg"/>
</div>
<div class="flex-1">
<div class="flex justify-between items-start mb-1">
<h3 class="font-bold text-on-surface text-lg">ارسال معمولی (Standard)</h3>
<span class="text-on-surface font-bold font-body">رایگان</span>
</div>
<p class="text-on-surface-variant text-sm mb-3">ارسال اقتصادی توسط پست پیشتاز</p>
<div class="flex items-center gap-4 text-xs font-medium text-on-surface/70">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-base" data-icon="local_shipping">local_shipping</span>
<span>3 تا 5 روز کاری</span>
</div>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center mt-1">
<div class="w-2 h-2 rounded-full bg-white opacity-0 peer-checked:opacity-100"></div>
</div>
</div>
</label>
</div>
<!-- Summary Preview Card -->
<section class="mt-10 p-6 rounded-3xl bg-surface-container-low">
<h4 class="text-sm font-bold text-on-surface-variant mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="receipt_long">receipt_long</span>
                خلاصه سفارش
            </h4>
<div class="space-y-3">
<div class="flex justify-between text-sm">
<span class="text-on-surface-variant">قیمت کالاها (2 مورد)</span>
<span class="font-body text-on-surface">1,240,000 تومان</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-on-surface-variant">هزینه ارسال</span>
<span class="font-body text-primary">45,000 تومان</span>
</div>
<div class="pt-3 border-t border-outline-variant/20 flex justify-between">
<span class="font-bold text-on-surface">مبلغ قابل پرداخت</span>
<span class="font-bold text-on-surface font-body text-lg">1,285,000 تومان</span>
</div>
</div>
</section>
</main>
<!-- Bottom Action Shell -->
<div class="fixed bottom-0 w-full z-50 glass-nav px-8 py-4 pb-safe flex flex-col gap-4 shadow-[0_-12px_32px_rgba(26,28,28,0.06)] rounded-t-3xl">
<div class="flex justify-around items-center w-full">
<div class="flex-1 flex flex-col">
<span class="text-[10px] text-on-surface-variant">جمع نهایی</span>
<span class="text-lg font-black text-on-surface font-body">1,285,000 تومان</span>
</div>
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary px-8 py-4 rounded-full font-bold text-base shadow-lg active:scale-95 transition-transform flex items-center gap-2">
<span>تایید و ادامه خرید</span>
<span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
</button>
</div>
</div>
<!-- Hidden Bottom Nav for Desktop Logic (Suppressed per task context) -->
<footer class="hidden md:flex fixed bottom-0 left-0 right-0 h-1 px-8"></footer>
</body></html>
