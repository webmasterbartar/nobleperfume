<!DOCTYPE html>

<html dir="rtl" lang="fa"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<!-- tailwind mock config removed -->
<style>
        body { font-family: 'Vazirmatn', 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow { box-shadow: 0 12px 32px rgba(26, 28, 28, 0.06); }
        .primary-gradient { background: linear-gradient(135deg, #b70f33 0%, #db3049 100%); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-gray-900 flex justify-between items-center px-6 h-16 transition-colors">
<div class="flex items-center gap-4">
<button class="hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-red-700 dark:text-red-500">arrow_forward</span>
</button>
<h1 class="text-[1.5rem] font-bold text-on-surface dark:text-gray-100">Check out</h1>
</div>
<div class="flex items-center gap-2">
<span class="text-[0.875rem] font-medium text-secondary">2 کالا</span>
</div>
</header>
<main class="pt-20 px-4 space-y-6 max-w-2xl mx-auto">
<!-- Cart Items List -->
<section class="space-y-4">
<!-- Product Card 1 -->
<div class="bg-surface-container-lowest rounded-xl p-4 editorial-shadow flex gap-4 relative overflow-hidden">
<div class="w-24 h-24 rounded-lg overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="Close-up of a premium minimalist ceramic vase with organic textures on a neutral background" src="../assets/images/placeholder-hero.svg"/>
</div>
<div class="flex-grow flex flex-col justify-between">
<div>
<div class="flex justify-between items-start">
<h3 class="text-on-surface font-bold text-lg leading-tight">گلدان سرامیکی مینیمال</h3>
<button class="text-outline-variant hover:text-error transition-colors p-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">delete</span>
</button>
</div>
<p class="text-on-surface-variant text-sm mt-1">رنگ: سفید استخوانی</p>
</div>
<div class="flex justify-between items-center mt-2">
<span class="text-primary font-bold text-lg">450,000 تومان</span>
<div class="flex items-center bg-surface-container-high rounded-full px-2 py-1 gap-4">
<button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-sm">add</span>
</button>
<span class="font-bold text-sm">1</span>
<button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
</div>
</div>
</div>
</div>
<!-- Product Card 2 -->
<div class="bg-surface-container-lowest rounded-xl p-4 editorial-shadow flex gap-4 relative overflow-hidden">
<div class="w-24 h-24 rounded-lg overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="High-quality handcrafted leather notebook with visible stitching and premium paper texture" src="../assets/images/placeholder-hero.svg"/>
</div>
<div class="flex-grow flex flex-col justify-between">
<div>
<div class="flex justify-between items-start">
<h3 class="text-on-surface font-bold text-lg leading-tight">دفترچه چرمی دست‌دوز</h3>
<button class="text-outline-variant hover:text-error transition-colors p-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">delete</span>
</button>
</div>
<p class="text-on-surface-variant text-sm mt-1">سایز: A5</p>
</div>
<div class="flex justify-between items-center mt-2">
<span class="text-primary font-bold text-lg">280,000 تومان</span>
<div class="flex items-center bg-surface-container-high rounded-full px-2 py-1 gap-4">
<button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-sm">add</span>
</button>
<span class="font-bold text-sm">2</span>
<button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-sm">remove</span>
</button>
</div>
</div>
</div>
</div>
</section>
<!-- Order Summary -->
<section class="bg-surface-container-low rounded-2xl p-6 space-y-4">
<h2 class="text-xl font-bold mb-4">خلاصه سفارش</h2>
<div class="flex justify-between items-center text-on-surface-variant">
<span>جمع جزء</span>
<span class="font-medium text-on-surface">1,010,000 تومان</span>
</div>
<div class="flex justify-between items-center text-on-surface-variant">
<span>هزینه ارسال</span>
<span class="font-medium text-on-surface">45,000 تومان</span>
</div>
<div class="pt-4 border-t border-outline-variant/15 flex justify-between items-center">
<span class="text-lg font-bold">مجموع کل</span>
<span class="text-2xl font-black text-primary">1,055,000 تومان</span>
</div>
</section>
<!-- Voucher Input -->
<div class="flex gap-2">
<input class="flex-grow bg-surface-container-high border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 text-sm" placeholder="کد تخفیف" type="text"/>
<button class="px-6 py-3 font-bold text-primary hover:bg-primary/5 rounded-xl transition-colors">اعمال</button>
</div>
</main>
<!-- BottomNavBar as Checkout Panel -->
<nav class="fixed bottom-0 w-full z-50 bg-surface/70 dark:bg-gray-900/70 backdrop-blur-md rounded-t-3xl shadow-[0_-12px_32px_rgba(26,28,28,0.06)] px-8 py-6 pb-safe">
<div class="max-w-2xl mx-auto flex flex-col md:flex-row gap-4 items-center justify-between">
<div class="hidden md:flex flex-col">
<span class="text-xs text-on-surface-variant">مبلغ نهایی</span>
<span class="text-xl font-black text-primary">1,055,000 تومان</span>
</div>
<button class="w-full primary-gradient text-white rounded-full py-4 px-8 font-black text-lg flex items-center justify-center gap-3 active:scale-98 transition-transform duration-200">
<span>تکمیل و پرداخت نهایی</span>
<span class="material-symbols-outlined">payments</span>
</button>
<!-- Bottom Icons for Tab Navigation context -->
<div class="w-full flex justify-around items-center pt-4 md:hidden border-t border-outline-variant/10 mt-2">
<div class="flex flex-col items-center justify-center bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 rounded-2xl px-6 py-2 scale-98">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
<span class="text-[0.875rem] font-medium">Cart</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 px-6 py-2 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">payments</span>
<span class="text-[0.875rem] font-medium">Pay</span>
</div>
</div>
</div>
</nav>
</body></html>
